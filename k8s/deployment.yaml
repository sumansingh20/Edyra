apiVersion: apps/v1
kind: Deployment
metadata:
  name: edyra-backend
  labels:
    app: edyra-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: edyra-backend
  template:
    metadata:
      labels:
        app: edyra-backend
    spec:
      containers:
      - name: edyra-backend
        image: edyra-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: edyra-config
        - secretRef:
            name: edyra-secrets
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edyra-frontend
  labels:
    app: edyra-frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: edyra-frontend
  template:
    metadata:
      labels:
        app: edyra-frontend
    spec:
      containers:
      - name: edyra-frontend
        image: edyra-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: edyra-frontend-config
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
